<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Chấm Điểm Phát Âm Tiếng Trung</title>
    
    <script src="https://unpkg.com/pinyin-pro"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 650px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Khu vực hiển thị chữ Hán và Pinyin thẳng hàng dọc */
        .sentence-display {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 25px 20px;
            min-height: 90px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px 14px;
            margin-bottom: 25px;
        }

        .word-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-width: 35px;
        }

        .pinyin-text {
            font-size: 14px;
            color: #64748b;
            height: 22px;
            font-weight: 400;
        }

        .hanzi-text {
            font-size: 32px;
            font-weight: 500;
            border-bottom: 4px solid transparent;
            padding-bottom: 2px;
            transition: color 0.3s ease;
        }

        /* Trạng thái chấm điểm phát âm */
        .correct { color: var(--success); border-bottom-color: var(--success); }
        .incorrect { color: var(--danger); border-bottom-color: var(--danger); text-decoration: none; }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-audio { background-color: #ec4899; color: white; }
        .btn-audio:hover { background-color: #db2777; }
        
        .btn-mic { background-color: var(--primary); color: white; }
        .btn-mic:hover { background-color: var(--primary-hover); }
        .btn-mic.recording { background-color: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1); }
        }

        .result-panel {
            border-top: 2px dashed #e2e8f0;
            padding-top: 25px;
            display: none;
        }

        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 15px auto;
        }

        .feedback {
            text-align: center;
            font-style: italic;
            color: #64748b;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .transcript-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <H1> NGUYEN NGOC YEN LAN </H1>

<div class="app-container">
    <h1><span class="material-icons">record_voice_over</span> AI CHẤM ĐIỂM TIẾNG TR
